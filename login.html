<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at top, #1a1600, #000);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    background: #111;
    border: 1px solid rgba(252,163,17,0.3);
    padding: 40px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

h1 {
    color: #fca311;
}

input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    background: black;
    border: 1px solid #333;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to bottom, #ffb703, #fb8500);
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="box">
    <h1>SNIPER LOGIN</h1>

    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">ENTER</button>

    <div id="error" class="error"></div>
</div>

<script>
function login() {
    const pass = document.getElementById("pass").value;

    if (pass === "sniper2026") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "index.html";
    } else {
        document.getElementById("error").innerText = "Wrong password";
    }
}
</script>

</body>
</html>
