<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memecoin Sniper UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-panel: #111111;
            --gold-light: #ffc857;
            --gold-main: #fca311;
            --gold-dark: #b07000;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-green: #a2ff00;
            --accent-red: #ff3333;
            --panel-border: rgba(252, 163, 17, 0.3);
            --panel-shadow: 0 0 15px rgba(252, 163, 17, 0.05), inset 0 0 20px rgba(0,0,0,0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 0%, #1a1600 0%, var(--bg-main) 60%);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, var(--gold-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(252, 163, 17, 0.4);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: -5px;
        }

        .subtitle::before, .subtitle::after {
            content: "";
            height: 1px;
            width: 50px;
            background: linear-gradient(to right, transparent, var(--gold-main), transparent);
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tab {
            background: linear-gradient(to bottom, #1a1a1a, var(--bg-main));
            border: 1px solid var(--panel-border);
            color: var(--text-muted);
            padding: 8px 30px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(to bottom, #2a1f00, var(--bg-main));
            color: var(--gold-light);
            border-bottom: none;
            box-shadow: inset 0 2px 10px rgba(252, 163, 17, 0.2);
        }

        /* --- VIEW CONTROLLER --- */
        .view-section {
            display: none; /* Domyślnie ukrywamy wszystkie sekcje */
            animation: fadeIn 0.3s ease-in-out;
        }

        .view-section.active {
            display: block; /* Pokazujemy tylko tę z klasą 'active' */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- LAYOUT GRID --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* --- PANELS --- */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 20px;
            box-shadow: var(--panel-shadow);
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-main), transparent);
            opacity: 0.5;
        }

        .panel-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold-light);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header::before {
            content: '•';
            color: var(--gold-main);
        }

        /* --- TRADER TERMINAL ELEMENTS --- */
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex-grow: 1; background: #050505; border: 1px solid #333; color: white; padding: 10px 15px; font-family: inherit; border-radius: 4px; box-shadow: inset 0 0 10px black; }
        .search-input:focus { outline: none; border-color: var(--gold-dark); }
        .btn { background: #222; border: 1px solid #444; color: white; font-family: inherit; font-weight: 600; padding: 10px 20px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(to bottom, #ffb703, #fb8500); border: 1px solid #ffea00; color: black; text-shadow: 0 1px 2px rgba(255,255,255,0.5); box-shadow: 0 0 10px rgba(251, 133, 0, 0.4); }
        .btn-primary:hover { box-shadow: 0 0 15px rgba(251, 133, 0, 0.7); transform: scale(1.02); }

        .alert-box { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(90deg, #0f0f0f, #1a1605); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .score-display { text-align: center; border-right: 1px solid #333; padding-right: 20px; }
        .score-title { color: var(--text-muted); font-size: 0.9rem; letter-spacing: 1px;}
        .score-value { font-size: 3rem; font-weight: 700; color: var(--gold-light); text-shadow: 0 0 10px var(--gold-dark); line-height: 1;}
        .score-max { font-size: 1.5rem; color: var(--text-muted); }
        .alert-details { flex-grow: 1; padding-left: 20px; text-align: center; }
        .strong-buy { font-size: 1.8rem; color: var(--accent-green); font-weight: 700; text-shadow: 0 0 10px rgba(162, 255, 0, 0.4); letter-spacing: 1px; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: center; gap: 20px; font-size: 1rem; color: #ccc; }
        .stats-row span { color: var(--text-muted); }

        /* --- LISTS --- */
        .data-list { list-style: none; }
        .data-list li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #333; font-size: 1.1rem; }
        .data-list li:last-child { border-bottom: none; }
        .coin-name { font-weight: 600; color: #fff; }
        .coin-rank { color: var(--gold-main); width: 20px; display: inline-block; }
        .badge { background: var(--accent-red); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; margin-left: 10px; font-weight: 700; }

        /* --- FOOTER NEWS --- */
        .footer-ticker { margin-top: 10px; text-align: center; font-size: 0.9rem; color: var(--gold-light); display: flex; justify-content: center; align-items: center; gap: 15px; }
        .footer-ticker::before, .footer-ticker::after { content: "➔"; color: var(--text-muted); }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .alert-box { flex-direction: column; gap: 20px; }
            .score-display { border-right: none; border-bottom: 1px solid #333; padding-right: 0; padding-bottom: 20px; }
        }
        
        .alert-box.high { background: linear-gradient(90deg, #001a00, #004d00); }
        .alert-box.medium { background: linear-gradient(90deg, #2a1f00, #5c3b00); }
        .alert-box.low { background: linear-gradient(90deg, #1a0f0f, #3a1f1f); }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="title">MEMECOIN SNIPER.</div>
        <div class="subtitle">REAL-TIME ANALYZER • EDGE TOOL</div>
    </header>

    <div class="tabs">
        <button class="tab active" id="btn-analyzer" onclick="switchTab('analyzer')">ANALYZER</button>
    </div>

    <div id="view-analyzer" class="view-section active">
        <div class="main-grid">
            <div class="left-col" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="panel">
                    <div class="panel-header" style="color: #fff;">Trader Terminal</div>
                    <div class="search-bar">
                        <input id="tokenInput" onkeypress="if(event.key==='Enter'){analyze()}" type="text" class="search-input" placeholder="Paste token CA...">
                        <button class="btn" onclick="pasteToken()">PASTE</button>
                        <button class="btn btn-primary" onclick="analyze()">ANALYZE TOKEN</button>
                        <label style="display:block; margin-top:10px;">
                        STRONG BUY ≥ 
                        <input type="number" id="strongBuyThreshold" value="6" style="width:50px;">
                        </label>
                    </div>

                    <div id="analyzerResult"></div>
                </div>
                <button class="btn" style="margin-top: 10px;" onclick="copyResult()">📋 Copy Result</button>
                <!-- Lista ostatnich tokenów -->
<div class="panel" style="margin-top: 10px;">
    <div class="panel-header" style="color: #fff;">Last Tokens</div>
    <ul id="historyList" class="data-list"></ul>
</div>
</div>

<script>

    function switchTab(tabName) {
    }
    
// ================= ANALYZER =================
// ==== HISTORIA TOKENÓW ====
let history = [];
function addToHistory(token) {
    // Sprawdzamy, czy token jest taki sam jak ostatni w historii
    if(history[0] === token) return;

    history.unshift(token); // dodaj na początek
    if(history.length > 5) history.pop(); // zachowaj max 5

    document.getElementById("historyList").innerHTML =
        history.map(t => `<li>${t}</li>`).join("");
}

// ==== KOPIOWANIE WYNIKU ====
function copyResult() {
    const el = document.getElementById("analyzerResult");
    navigator.clipboard.writeText(el.innerText);
    alert("Skopiowano wynik!");
}

async function analyze() {
    document.getElementById("analyzerResult").innerHTML = "";
    const address = document.getElementById("tokenInput").value;
    if (!address) return alert("Wklej adres!");

    let data;
    try {
        const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${address}`);
        data = await res.json();
    } catch (err) {
        console.error(err);
        data = null;
    }

    let pair, fdv, liquidity, volume, change1m, created, age;

    if (!data || !data.pairs || data.pairs.length === 0) {
        // Gdy token nie istnieje, wypełniamy wszystko zerami
        pair = { baseToken: { name: "UNKNOWN", symbol: address.toUpperCase() } };
        fdv = liquidity = volume = change1m = created = 0;
        age = 0;

        // Dodajemy symbol do historii nawet gdy token nie istnieje
        addToHistory(pair.baseToken.symbol);

    } else {
        pair = data.pairs[0];
        fdv = pair.fdv || 0;
        liquidity = pair.liquidity?.usd || 0;
        volume = pair.volume?.h24 || 0;
        change1m = pair.priceChange?.m1 || 0;
        created = pair.pairCreatedAt || 0;
        age = created ? (Date.now() - created) / 60000 : 0;

        addToHistory(pair.baseToken.symbol);
    }

    const liq_mc = fdv ? liquidity / fdv : 0;
    const vol_liq = liquidity ? volume / liquidity : 0;

    let score = 0;
    if (liq_mc > 0.02) score += 2;
    if (vol_liq < 5) score += 2;
    if (change1m > 0.5) score += 1;
    if (volume > 1000) score += 1;
    if (age < 60) score += 1;

    let decision = "SKIP";
    let color = "var(--accent-red)";
    const strongBuyThreshold = Number(document.getElementById("strongBuyThreshold").value);

    if(score >= strongBuyThreshold) {
        decision = "🔥 STRONG BUY";
        color = "var(--accent-green)";
    } else if(score >= 4) {
        decision = "⚡ SCALP";
        color = "var(--gold-main)";
    }

    let alertClass = "low";
    if(score >= strongBuyThreshold) alertClass = "high";
    else if(score >= 4) alertClass = "medium";

    document.getElementById("analyzerResult").innerHTML = `
        <div class="panel-header" style="color: #fff; font-size: 1.3rem;">
            ${pair.baseToken.name} (${pair.baseToken.symbol})
        </div>

        <div class="alert-box ${alertClass}">
            <div class="score-display">
                <div class="score-title">SCORE</div>
                <span class="score-value">${score}</span><span class="score-max">/7</span>
            </div>
            <div class="alert-details">
                <div class="strong-buy" style="color:${color}">
                    ${data && data.pairs && data.pairs.length > 0 ? decision : "❌ TOKEN NOT FOUND"}
                </div>
                <div class="stats-row">
                    <div><span>MC:</span> $${Math.round(fdv)}</div> |
                    <div><span>LIQ:</span> $${Math.round(liquidity)}</div> |
                    <div><span>VOL:</span> $${Math.round(volume)}</div>
                </div>
                <div class="stats-row" style="margin-top: 10px;">
                    <div><span>AGE:</span> ${age.toFixed(1)}m</div>
                </div>
            </div>
        </div>
    `;
}

setInterval(() => {
    const addr = document.getElementById("tokenInput").value;
    if(addr) analyze();
}, 30000); // co 30 sekund

</script>

</body>
</html>
