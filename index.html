<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sniper PRO</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #0b0f14;
    color: #e6edf3;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 40px;
    border-bottom: 1px solid #1f2933;
}

.logo {
    font-weight: 600;
    font-size: 18px;
    color: #58a6ff;
}

.tabs button {
    background: none;
    border: none;
    color: #8b949e;
    margin-left: 20px;
    font-size: 14px;
    cursor: pointer;
}

.tabs button.active {
    color: white;
    border-bottom: 2px solid #58a6ff;
}

/* LAYOUT */
.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

/* CARD */
.card {
    background: #11161c;
    border: 1px solid #1f2933;
    border-radius: 14px;
    padding: 25px;
    margin-bottom: 25px;
}

/* INPUT */
.input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #1f2933;
    background: #0b0f14;
    color: white;
    margin-top: 10px;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #238636;
    color: white;
    cursor: pointer;
    font-weight: 500;
}

.btn:hover {
    background: #2ea043;
}

/* RESULT */
.result {
    margin-top: 20px;
    line-height: 1.8;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    text-align: left;
    font-size: 12px;
    color: #8b949e;
    padding-bottom: 10px;
}

td {
    padding: 12px 0;
    border-top: 1px solid #1f2933;
}

/* COLORS */
.good { color: #3fb950; }
.warn { color: #d29922; }
.bad { color: #f85149; }

/* FUTURE */
.side {
    position: fixed;
    right: 0;
    top: 0;
    width: 220px;
    height: 100%;
    border-left: 1px solid #1f2933;
    padding: 30px 20px;
    background: #0b0f14;
}

.side h4 {
    color: #8b949e;
    font-size: 12px;
    margin-bottom: 15px;
}

.side p {
    font-size: 13px;
    margin: 10px 0;
    color: #c9d1d9;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">Sniper PRO</div>

    <div class="tabs">
        <button onclick="showTab('analyzer')" id="tab1" class="active">Analyzer</button>
        <button onclick="showTab('scanner')" id="tab2">Scanner</button>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- ANALYZER -->
    <div id="analyzer" class="card">
        <h3>Analyze token</h3>
        <input id="tokenInput" class="input" placeholder="Paste contract address">

        <button class="btn" onclick="analyze()">Analyze</button>

        <div id="result" class="result"></div>
    </div>

    <!-- SCANNER -->
    <div id="scanner" class="card" style="display:none;">
        <h3>Live scanner</h3>
        <div id="scannerTable"></div>
    </div>

</div>

<!-- FUTURE PANEL -->
<div class="side">
    <h4>ROADMAP</h4>
    <p>Filters</p>
    <p>Alerts</p>
    <p>Wallet tracking</p>
    <p>AI signals</p>
</div>

<script>
function showTab(tab) {
    document.getElementById("analyzer").style.display = tab === "analyzer" ? "block" : "none";
    document.getElementById("scanner").style.display = tab === "scanner" ? "block" : "none";

    document.getElementById("tab1").classList.toggle("active", tab === "analyzer");
    document.getElementById("tab2").classList.toggle("active", tab === "scanner");
}

// ANALYZER
async function analyze() {
    const address = document.getElementById("tokenInput").value;
    if (!address) return;

    const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${address}`);
    const data = await res.json();

    if (!data.pairs || data.pairs.length === 0) {
        document.getElementById("result").innerHTML = "Not found";
        return;
    }

    const p = data.pairs[0];

    const fdv = p.fdv || 0;
    const liq = p.liquidity?.usd || 0;
    const vol = p.volume?.h24 || 0;
    const change = p.priceChange?.m1 || 0;

    const age = p.pairCreatedAt ? (Date.now() - p.pairCreatedAt)/60000 : 9999;

    const liqmc = liq / fdv;
    const volliq = vol / liq;

    let score = 0;
    if (liqmc > 0.02) score += 2;
    if (volliq < 5) score += 2;
    if (change > 0.5) score += 1;
    if (vol > 1000) score += 1;
    if (age < 60) score += 1;

    let label = "SKIP", cls="bad";
    if (score >= 6) { label="STRONG BUY"; cls="good"; }
    else if (score >= 4) { label="SCALP"; cls="warn"; }

    document.getElementById("result").innerHTML = `
        <b>${p.baseToken.symbol}</b><br>
        Score: ${score}/7 <span class="${cls}">(${label})</span><br><br>

        MC: ${Math.round(fdv)}<br>
        Liquidity: ${Math.round(liq)}<br>
        Volume: ${Math.round(vol)}<br>
        Age: ${age.toFixed(1)}m<br>
    `;
}

// SCANNER
async function scan() {
    const res = await fetch("https://api.dexscreener.com/latest/dex/search?q=pump");
    const data = await res.json();

    let html = "<table><tr><th>Token</th><th>Score</th><th>Vol</th></tr>";

    data.pairs.forEach(p => {
        if (p.chainId !== "solana") return;

        const vol = p.volume?.h24 || 0;
        const liq = p.liquidity?.usd || 0;
        const fdv = p.fdv || 0;

        let score = 0;
        if (liq/fdv > 0.02) score++;
        if (vol/liq < 10) score++;

        if (vol > 100) {
            html += `<tr><td>${p.baseToken.symbol}</td><td>${score}</td><td>${Math.round(vol)}</td></tr>`;
        }
    });

    html += "</table>";
    document.getElementById("scannerTable").innerHTML = html;
}

setInterval(scan, 8000);
scan();
</script>

</body>
</html>
