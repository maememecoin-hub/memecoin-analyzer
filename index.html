<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Memecoin Sniper PRO</title>

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #0d1117, #05070a);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(20,20,20,0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #222;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #58a6ff;
}

.menu button {
    margin-left: 10px;
    padding: 8px 14px;
    border: none;
    background: #161b22;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.menu button.active {
    background: #238636;
}

/* MAIN */
.container {
    padding: 30px;
}

/* CARD */
.card {
    background: rgba(20,20,20,0.6);
    border: 1px solid #222;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

/* INPUT */
input {
    padding: 12px;
    width: 300px;
    border-radius: 8px;
    border: none;
    background: #161b22;
    color: white;
}

/* BUTTON */
.btn {
    padding: 12px 18px;
    margin-left: 10px;
    border-radius: 8px;
    border: none;
    background: #238636;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #2ea043;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #222;
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

/* COLORS */
.good { color: #00ff88; }
.warn { color: orange; }
.bad { color: red; }

/* BADGE */
.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

/* FUTURE PANEL */
.future {
    position: fixed;
    right: 0;
    top: 0;
    height: 100%;
    width: 200px;
    background: #0d1117;
    border-left: 1px solid #222;
    padding: 20px;
}

.future h3 {
    font-size: 14px;
    color: #888;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div class="logo">🚀 Sniper PRO</div>

    <div class="menu">
        <button onclick="showTab('analyzer')" id="tab1" class="active">Analyzer</button>
        <button onclick="showTab('scanner')" id="tab2">Scanner</button>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- ANALYZER -->
    <div id="analyzer" class="card">
        <h2>🧠 Analyzer</h2>

        <input id="tokenInput" placeholder="Wklej CA tokena">
        <button class="btn" onclick="analyze()">Analizuj</button>

        <div id="result" style="margin-top:20px;"></div>
    </div>

    <!-- SCANNER -->
    <div id="scanner" class="card" style="display:none;">
        <h2>🤖 Auto Scanner</h2>

        <div id="scannerTable"></div>
    </div>

</div>

<!-- FUTURE PANEL -->
<div class="future">
    <h3>⚙️ FUTURE</h3>
    <p>Filters</p>
    <p>Alerts</p>
    <p>Wallet tracking</p>
    <p>AI signals</p>
</div>

<script>
function showTab(tab) {
    document.getElementById("analyzer").style.display = tab === "analyzer" ? "block" : "none";
    document.getElementById("scanner").style.display = tab === "scanner" ? "block" : "none";

    document.getElementById("tab1").classList.toggle("active", tab === "analyzer");
    document.getElementById("tab2").classList.toggle("active", tab === "scanner");
}

// ================= ANALYZER =================
async function analyze() {
    const address = document.getElementById("tokenInput").value;

    if (!address) return alert("Wklej adres!");

    const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${address}`);
    const data = await res.json();

    if (!data.pairs || data.pairs.length === 0) {
        document.getElementById("result").innerHTML = "❌ Token nie znaleziony";
        return;
    }

    const pair = data.pairs[0];

    const fdv = pair.fdv || 0;
    const liquidity = pair.liquidity?.usd || 0;
    const volume = pair.volume?.h24 || 0;
    const change1m = pair.priceChange?.m1 || 0;

    const created = pair.pairCreatedAt || 0;
    const age = created ? (Date.now() - created) / 60000 : 9999;

    const liq_mc = liquidity / fdv;
    const vol_liq = volume / liquidity;

    let score = 0;
    if (liq_mc > 0.02) score += 2;
    if (vol_liq < 5) score += 2;
    if (change1m > 0.5) score += 1;
    if (volume > 1000) score += 1;
    if (age < 60) score += 1;

    let decision = "❌ SKIP";
    let cls = "bad";

    if (score >= 6) { decision = "🔥 STRONG BUY"; cls="good"; }
    else if (score >= 4) { decision = "⚡ SCALP"; cls="warn"; }

    document.getElementById("result").innerHTML = `
        <h3>${pair.baseToken.name} (${pair.baseToken.symbol})</h3>
        <p>SCORE: ${score}/7</p>
        <p class="${cls}">${decision}</p>

        <hr>

        MC: $${Math.round(fdv)}<br>
        Liquidity: $${Math.round(liquidity)}<br>
        Volume: $${Math.round(volume)}<br>
        Age: ${age.toFixed(1)} min<br>
        Liq/MC: ${(liq_mc*100).toFixed(2)}%<br>
        Vol/Liq: ${vol_liq.toFixed(2)}
    `;
}

// ================= SCANNER =================
async function loadScanner() {
    const res = await fetch("https://api.dexscreener.com/latest/dex/search?q=pump");
    const data = await res.json();

    let html = "<table><tr><th>Token</th><th>Score</th><th>1m%</th><th>Vol</th><th>Liq</th></tr>";

    data.pairs.forEach(pair => {
        if (pair.chainId !== "solana") return;

        const fdv = pair.fdv || 0;
        const liquidity = pair.liquidity?.usd || 0;
        const volume = pair.volume?.h24 || 0;
        const change1m = pair.priceChange?.m1 || 0;

        let score = 0;
        if (fdv > 0 && liquidity / fdv > 0.02) score++;
        if (liquidity > 0 && volume / liquidity < 10) score++;
        if (change1m > 0) score++;

        if (volume > 100 && liquidity > 50) {
            html += `
                <tr>
                    <td>${pair.baseToken.symbol}</td>
                    <td>${score}</td>
                    <td>${change1m.toFixed(2)}</td>
                    <td>${Math.round(volume)}</td>
                    <td>${Math.round(liquidity)}</td>
                </tr>
            `;
        }
    });

    html += "</table>";

    document.getElementById("scannerTable").innerHTML = html;
}

setInterval(loadScanner, 8000);
loadScanner();
</script>

</body>
</html>
