<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memecoin Sniper</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    background: #020617;
    font-family: 'Inter', sans-serif;
    color: white;
}

.gold {
    background: linear-gradient(90deg,#d4af37,#facc15);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,175,55,0.2);
}

.glow {
    box-shadow: 0 0 20px rgba(212,175,55,0.3);
}

</style>
</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

<!-- HEADER -->
<div class="mb-10 text-center">
    <h1 class="text-5xl font-bold gold tracking-widest">MEMECOIN SNIPER</h1>
    <p class="text-gray-500 text-sm tracking-widest mt-2">REAL-TIME ANALYZER • EDGE TOOL</p>
</div>

<!-- TABS -->
<div class="flex gap-6 mb-8 justify-center">
    <button class="text-yellow-400 border-b-2 border-yellow-400 pb-2">ANALYZER</button>
    <button class="text-gray-500 hover:text-white">SCANNER</button>
</div>

<!-- INPUT -->
<div class="card p-6 rounded-xl mb-8 flex gap-4 items-center">
    <input id="tokenInput" placeholder="Paste token CA..."
        class="flex-1 bg-black/40 p-4 rounded-lg outline-none">

    <button onclick="pasteToken()" class="bg-gray-700 px-5 py-3 rounded-lg">PASTE</button>

    <button onclick="analyzeToken()" class="bg-yellow-500 text-black px-6 py-3 rounded-lg font-bold glow">
        ANALYZE
    </button>
</div>

<!-- MAIN GRID -->
<div class="grid grid-cols-3 gap-6">

<!-- TOKEN CARD -->
<div class="col-span-2 card p-6 rounded-xl">

    <h2 id="tokenName" class="text-xl font-bold mb-4">Token Name</h2>

    <div class="flex gap-6 items-center">

        <div class="bg-black p-6 rounded-lg text-center">
            <p class="text-gray-400 text-sm">SCORE</p>
            <p id="score" class="text-3xl font-bold text-yellow-400">0/7</p>
        </div>

        <div>
            <p id="decision" class="text-xl font-bold text-green-400">WAITING...</p>

            <div class="flex gap-4 mt-3 text-sm text-gray-400">
                <span id="mc">MC: -</span>
                <span id="liq">LIQ: -</span>
                <span id="vol">VOL: -</span>
                <span id="age">AGE: -</span>
            </div>
        </div>

    </div>
</div>

<!-- SIDE PANEL -->
<div class="space-y-6">

    <div class="card p-4 rounded-xl">
        <h3 class="text-yellow-400 mb-3">TOP COINS</h3>
        <ul class="text-sm space-y-2">
            <li>1. DOGECOIN</li>
            <li>2. PEPE</li>
            <li>3. SHIBA</li>
        </ul>
    </div>

    <div class="card p-4 rounded-xl">
        <h3 class="text-yellow-400 mb-3">ALERT LOG</h3>
        <ul class="text-sm space-y-2">
            <li>STRONG BUY detected</li>
        </ul>
    </div>

</div>

</div>

<!-- SCANNER -->
<div class="mt-10 card p-6 rounded-xl">
    <h3 class="text-yellow-400 mb-4">LIVE SCANNER</h3>
    <table class="w-full text-sm">
        <thead>
            <tr class="text-gray-400">
                <th>Name</th>
                <th>Score</th>
                <th>Volume</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody id="scannerTable"></tbody>
    </table>
</div>

</div>

<script>

// PASTE BUTTON
async function pasteToken() {
    const text = await navigator.clipboard.readText();
    document.getElementById("tokenInput").value = text;
}

// ANALYZER
async function analyzeToken() {
    const token = document.getElementById("tokenInput").value;

    const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${token}`);
    const data = await res.json();

    const pair = data.pairs[0];

    const name = pair.baseToken.name;
    const mc = pair.fdv || 0;
    const liq = pair.liquidity.usd || 0;
    const vol = pair.volume.h24 || 0;

    document.getElementById("tokenName").innerText = name;

    document.getElementById("mc").innerText = "MC: $" + Math.floor(mc);
    document.getElementById("liq").innerText = "LIQ: $" + Math.floor(liq);
    document.getElementById("vol").innerText = "VOL: $" + Math.floor(vol);

    let score = 0;

    if (liq/mc > 0.02) score += 2;
    if (vol/liq < 5) score += 2;
    if (vol > 1000) score += 1;

    document.getElementById("score").innerText = score + "/7";

    if (score >= 5) {
        document.getElementById("decision").innerText = "🔥 STRONG BUY";
    } else {
        document.getElementById("decision").innerText = "❌ SKIP";
    }
}

</script>

</body>
</html>
