<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sniper PRO</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    background: radial-gradient(circle at top, #0f1720, #05070a);
    color: #e6edf3;
}

/* CENTER */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 420px;
    background: rgba(20,25,30,0.8);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.5s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1;}
}

/* TITLE */
.title {
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: 600;
}

/* INPUT GROUP */
.input-group {
    display: flex;
    gap: 10px;
}

/* INPUT */
input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #0b0f14;
    color: white;
    outline: none;
}

/* BUTTON */
.btn {
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #238636;
    color: white;
    cursor: pointer;
    font-weight: 500;
}

.btn:hover {
    background: #2ea043;
}

/* SMALL BTN */
.paste {
    background: #161b22;
}

.paste:hover {
    background: #1f2933;
}

/* RESULT */
.result {
    margin-top: 20px;
    font-size: 14px;
    line-height: 1.7;
}

/* SCORE COLORS */
.good { color: #3fb950; }
.warn { color: #d29922; }
.bad { color: #f85149; }

/* LOADER */
.loader {
    margin-top: 15px;
    font-size: 13px;
    color: #8b949e;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="card">

        <div class="title">🧠 Analyze Token</div>

        <div class="input-group">
            <input id="tokenInput" placeholder="Paste contract address">
            <button class="btn paste" onclick="paste()">📋</button>
        </div>

        <button class="btn" style="width:100%; margin-top:10px;" onclick="analyze()">
            Analyze
        </button>

        <div id="loading" class="loader"></div>
        <div id="result" class="result"></div>

    </div>
</div>

<script>

// 🔥 QUICK PASTE
async function paste() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById("tokenInput").value = text;
    } catch {
        alert("Clipboard blocked");
    }
}

// ANALYZER
async function analyze() {
    const address = document.getElementById("tokenInput").value;
    if (!address) return;

    document.getElementById("loading").innerText = "Analyzing...";
    document.getElementById("result").innerHTML = "";

    try {
        const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${address}`);
        const data = await res.json();

        if (!data.pairs || data.pairs.length === 0) {
            document.getElementById("loading").innerText = "";
            document.getElementById("result").innerHTML = "❌ Not found";
            return;
        }

        const p = data.pairs[0];

        const fdv = p.fdv || 0;
        const liq = p.liquidity?.usd || 0;
        const vol = p.volume?.h24 || 0;
        const change = p.priceChange?.m1 || 0;

        const age = p.pairCreatedAt ? (Date.now() - p.pairCreatedAt)/60000 : 9999;

        const liqmc = liq / fdv;
        const volliq = vol / liq;

        let score = 0;
        if (liqmc > 0.02) score += 2;
        if (volliq < 5) score += 2;
        if (change > 0.5) score += 1;
        if (vol > 1000) score += 1;
        if (age < 60) score += 1;

        let label = "SKIP", cls="bad";
        if (score >= 6) { label="STRONG BUY"; cls="good"; }
        else if (score >= 4) { label="SCALP"; cls="warn"; }

        document.getElementById("loading").innerText = "";

        document.getElementById("result").innerHTML = `
            <b>${p.baseToken.symbol}</b><br>
            Score: ${score}/7 <span class="${cls}">${label}</span><br><br>

            MC: ${Math.round(fdv)}<br>
            Liquidity: ${Math.round(liq)}<br>
            Volume: ${Math.round(vol)}<br>
            Age: ${age.toFixed(1)}m<br>
        `;

    } catch {
        document.getElementById("loading").innerText = "";
        document.getElementById("result").innerHTML = "❌ Error";
    }
}

</script>

</body>
</html>
