<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memecoin Sniper PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
    --gold: #d4af37;
}
body {
    background:#020617;
    color:white;
    font-family:'Inter';
}
.gold { color: var(--gold); }

.card {
    background: rgba(15,23,42,0.7);
    backdrop-filter: blur(12px);
    border:1px solid rgba(212,175,55,0.2);
    border-radius:20px;
}
</style>
</head>

<body class="p-6">

<div class="max-w-5xl mx-auto">

<h1 class="text-4xl font-black italic gold mb-6">MEMECOIN SNIPER</h1>

<!-- TABS -->
<div class="flex gap-6 mb-8 border-b border-gray-800">
<button onclick="switchTab('analyzer')" id="btn1" class="pb-3 border-b-2 border-yellow-500">Analyzer</button>
<button onclick="switchTab('scanner')" id="btn2" class="pb-3 text-gray-500">Auto Scanner</button>
</div>

<!-- ANALYZER -->
<div id="analyzer">

<div class="card p-6 mb-6">
<input id="tokenInput" placeholder="Wklej CA tokena..."
class="w-full p-4 bg-black border border-gray-800 rounded-xl mb-4">

<button onclick="analyze()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl">
ANALIZUJ
</button>
</div>

<div id="result" class="card p-6 hidden"></div>

</div>

<!-- SCANNER -->
<div id="scanner" class="hidden">

<div class="card p-6">
<h2 class="mb-4">LIVE TOKENS</h2>
<div id="scannerData"></div>
</div>

</div>

</div>

<script>

// TAB SWITCH
function switchTab(tab){
document.getElementById('analyzer').classList.add('hidden')
document.getElementById('scanner').classList.add('hidden')

document.getElementById(tab).classList.remove('hidden')
}

// =====================
// ANALYZER
// =====================
async function analyze(){

let ca = document.getElementById('tokenInput').value

if(!ca) return alert("Wklej adres")

let res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${ca}`)
let data = await res.json()

let pair = data.pairs?.[0]

if(!pair){
alert("Nie znaleziono")
return
}

let fdv = pair.fdv || 0
let liq = pair.liquidity?.usd || 0
let vol = pair.volume?.h24 || 0
let m1 = pair.priceChange?.m1 || 0
let age = (Date.now() - pair.pairCreatedAt)/60000

let liq_mc = liq / fdv
let vol_liq = vol / liq

// SCORE
let score = 0
if(liq_mc > 0.02) score += 2
if(vol_liq < 5) score += 2
if(m1 > 0.5) score += 1
if(vol > 1000) score += 1
if(age < 60) score += 1

let decision = "SKIP"
if(score >= 6) decision = "STRONG BUY"
else if(score >= 4) decision = "SCALP"

document.getElementById('result').classList.remove('hidden')
document.getElementById('result').innerHTML = `
<h2 class="text-2xl mb-4">${pair.baseToken.name}</h2>

<p>SCORE: <span class="gold">${score}/7</span></p>
<p>DECYZJA: ${decision}</p>

<hr class="my-4">

<p>MC: $${fdv}</p>
<p>LIQ: $${liq}</p>
<p>VOL: $${vol}</p>
<p>AGE: ${age.toFixed(1)} min</p>
`
}

// =====================
// SCANNER
// =====================
async function loadScanner(){

let res = await fetch(`https://api.dexscreener.com/latest/dex/search?q=pump`)
let data = await res.json()

let html = ""

data.pairs.forEach(p=>{

if(p.chainId !== "solana") return

let fdv = p.fdv || 0
let liq = p.liquidity?.usd || 0
let vol = p.volume?.h24 || 0
let m1 = p.priceChange?.m1 || 0
let age = (Date.now() - p.pairCreatedAt)/60000

let score = 0
if(liq/fdv > 0.02) score++
if(vol/liq < 10) score++
if(m1 > 0) score++

if(score >= 2){
html += `
<div class="border-b border-gray-800 py-3">
<b>${p.baseToken.symbol}</b>
| score: ${score}
| vol: ${vol}
| age: ${age.toFixed(0)}m
</div>`
}
})

document.getElementById('scannerData').innerHTML = html
}

// AUTO REFRESH
setInterval(loadScanner, 5000)

</script>

</body>
</html>
